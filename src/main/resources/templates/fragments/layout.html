<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, extraHead, main)">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title th:text="${pageTitle} + ' · FoodChain'">FoodChain</title>
	<link rel="stylesheet" th:href="@{/css/layout.css}"/>
	<th:block th:replace="${extraHead}"/>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
<div class="main">
	<header class="topbar">
		<button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false" aria-controls="app-sidebar">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
				<line x1="3" y1="6" x2="21" y2="6"/>
				<line x1="3" y1="12" x2="21" y2="12"/>
				<line x1="3" y1="18" x2="21" y2="18"/>
			</svg>
		</button>
		<span class="page-title" th:text="${pageTitle}">페이지</span>
		<div class="topbar-right">
			<span class="badge">오늘 입고 3건</span>
		</div>
	</header>
	<div class="content" th:insert="${main}"></div>
</div>
<script th:src="@{/js/layout.js}"></script>
</body>
</html>
