<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>상품 유형 목록 · FoodChain</title>
	<link rel="stylesheet" th:href="@{/css/product-types.css}"/>
</head>
<body>
<main class="page">
	<header class="header">
		<h1>상품 유형 목록</h1>
		<p class="subtitle">제품 ID 접두 코드와 유형별 발급 순번을 관리합니다.</p>
	</header>
	<p class="list-summary" th:if="${!#lists.isEmpty(productTypes)}">
		총 <span th:text="${#lists.size(productTypes)}">0</span>건
	</p>
	<section class="card">
		<div class="table-wrap" th:if="${!#lists.isEmpty(productTypes)}">
			<table>
				<thead>
				<tr>
					<th scope="col">ID</th>
					<th scope="col">유형 코드</th>
					<th scope="col">유형명</th>
					<th scope="col">발급 ID</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="type : ${productTypes}">
					<td th:text="${type.productTypeId}">1</td>
					<td><span class="type-code" th:text="${type.typeCode}">BAB</span></td>
					<td th:text="${type.typeName}">밥류</td>
					<td>
						<span class="next-id" th:text="${type.currentProductId()}">BAB-001</span>
					</td>
				</tr>
				</tbody>
			</table>
		</div>

		<div class="empty" th:if="${#lists.isEmpty(productTypes)}">
			<strong>등록된 상품 유형이 없습니다.</strong>
		</div>
	</section>
	<div class="page-actions">
		<a class="btn btn-primary" th:href="@{/product/type/form}">등록</a>
	</div>
</main>
</body>
</html>
