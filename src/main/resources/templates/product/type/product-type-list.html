<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{fragments/layout :: layout('상품 유형 목록', ~{::head-extra}, ~{::main})}">
<head>
	<th:block th:fragment="head-extra">
		<link rel="stylesheet" th:href="@{/css/product-types.css}"/>
	</th:block>
</head>
<body>
<div th:fragment="main" class="page">
	<header class="header">
		<h1>상품 유형 목록</h1>
	</header>
	<p class="list-summary" th:if="${page.totalElements > 0}">
		총 <span th:text="${page.totalElements}">0</span>건
	</p>
	<section class="card">
		<div class="table-wrap" th:if="${!page.empty}">
			<table>
				<thead>
				<tr>
					<th scope="col">유형 코드</th>
					<th scope="col">유형명</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="type : ${page.content}">
					<td><span class="type-code" th:text="${type.typeCode}">BAB</span></td>
					<td th:text="${type.typeName}">밥류</td>
				</tr>
				</tbody>
			</table>
		</div>

		<div class="empty" th:if="${page.empty}">
			<strong>등록된 상품 유형이 없습니다.</strong>
		</div>

		<div th:replace="~{fragments/pagination :: pagination(${page}, '/product/type')}"></div>
	</section>
	<div class="page-actions">
		<a class="btn btn-primary" th:href="@{/product/type/form}">등록</a>
	</div>
</div>
</body>
</html>
