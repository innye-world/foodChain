<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{fragments/layout :: layout('상품 등록', ~{::head-extra}, ~{::main})}">
<head>
	<th:block th:fragment="head-extra">
		<link rel="stylesheet" th:href="@{/css/product-types.css}"/>
	</th:block>
</head>
<body>
<div th:fragment="main" class="page">
	<header class="header">
		<h1>상품 등록</h1>
		<p class="subtitle">상품 ID는 유형 코드와 순번으로 자동 발급됩니다. (예: BAB-001)</p>
	</header>

	<section class="card form-card" th:if="${!#lists.isEmpty(productTypes)}">
		<form class="type-form" th:action="@{/product}" method="post">
			<div class="form-field">
				<label for="productTypeId">상품 유형</label>
				<select id="productTypeId" name="productTypeId" required>
					<option value="" disabled selected>유형 선택</option>
					<option th:each="type : ${productTypes}"
							th:value="${type.productTypeId}"
							th:text="${type.typeName + ' (' + type.typeCode + ')'}">
						밥류 (BAB)
					</option>
				</select>
			</div>

			<div class="form-field">
				<label for="productName">상품명</label>
				<input id="productName" name="productName" type="text" maxlength="100"
					   placeholder="예: 삼각김밥" required/>
			</div>

			<div class="form-field">
				<label for="storageType">보관 유형</label>
				<select id="storageType" name="storageType" required>
					<option value="" disabled selected>보관 유형 선택</option>
					<option th:each="storage : ${storageTypes}"
							th:value="${storage}"
							th:text="${storage}">
						REFRIGERATED
					</option>
				</select>
			</div>

			<div class="form-field">
				<label for="minTemperature">최저 온도(℃)</label>
				<input id="minTemperature" name="minTemperature" type="number" step="0.1"
					   placeholder="예: 0.0" required/>
			</div>

			<div class="form-field">
				<label for="maxTemperature">최고 온도(℃)</label>
				<input id="maxTemperature" name="maxTemperature" type="number" step="0.1"
					   placeholder="예: 10.0" required/>
			</div>

			<div class="form-field">
				<label for="warningThresholdDays">출고 경고 임박 일수</label>
				<input id="warningThresholdDays" name="warningThresholdDays" type="number"
					   min="1" step="1" value="7" required/>
				<p class="field-hint">유통기한이 N일 이내로 남으면 WARNING 대상 (FEFO 출고 마감 기준)</p>
			</div>

			<div class="form-field">
				<label for="warningThresholdPct">출고 경고 잔여 비율(%)</label>
				<input id="warningThresholdPct" name="warningThresholdPct" type="number"
					   min="0.1" max="100" step="0.1" value="20.0" required/>
				<p class="field-hint">전체 유통기한 대비 잔여 %가 N 이하이면 WARNING 대상</p>
			</div>

			<div class="form-actions">
				<a class="btn btn-secondary" th:href="@{/product}">취소</a>
				<button class="btn btn-primary" type="submit">저장</button>
			</div>
		</form>
	</section>

	<section class="card form-card empty" th:if="${#lists.isEmpty(productTypes)}">
		<strong>등록된 상품 유형이 없습니다.</strong>
		<p>상품을 등록하려면 먼저 상품 유형을 등록하세요.</p>
		<div class="form-actions">
			<a class="btn btn-primary" th:href="@{/product/type/form}">상품 유형 등록</a>
			<a class="btn btn-secondary" th:href="@{/product}">목록으로</a>
		</div>
	</section>
</div>
</body>
</html>
