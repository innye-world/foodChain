<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{fragments/layout :: layout(${pageTitle} ?: '대시보드', ~{::head-extra}, ~{::main})}">
<head>
	<th:block th:fragment="head-extra">
		<link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
	</th:block>
</head>
<body>
<div th:fragment="main" class="dashboard-content">
	<div class="metrics">
		<div class="metric-card">
			<div class="metric-label">전체 상품</div>
			<div class="metric-value" th:text="${#numbers.formatInteger(allProductCount, 0, 'COMMA')}">0</div>
			<div class="metric-sub metric-up" th:text="|↑ ${productsAddedThisWeek} 이번 주|">↑ 0 이번 주</div>
		</div>
		<div class="metric-card">
			<div class="metric-label">상품 유형</div>
			<div class="metric-value" th:text="${#numbers.formatInteger(allProductTypeCount, 0, 'COMMA')}">0</div>
			<div class="metric-sub" style="color: var(--color-text-hint)"
				 th:text="${#strings.isEmpty(typeString) ? '-' : typeString}">-</div>
		</div>
		<div class="metric-card">
			<div class="metric-label">총 재고</div>
			<div class="metric-value" th:text="${#numbers.formatInteger(allStockCount, 0, 'COMMA')}">0</div>
			<div class="metric-sub metric-up" th:text="|↑ ${stockCountOfToday} 오늘 입고|">↑ 0 오늘 입고</div>
		</div>
		<!-- 재고 부족 카드: 수치 연동 후 활성화
		<div class="metric-card">
			<div class="metric-label">재고 부족</div>
			<div class="metric-value metric-danger" th:text="${lowStockCount} ?: '3'">3</div>
			<div class="metric-sub metric-danger">확인 필요</div>
		</div>
		-->
	</div>

	<div class="charts-row">
		<div class="chart-card">
			<div class="chart-header">
				<span class="chart-title">입/출고 현황</span>
				<span class="chart-tag">최근 7일</span>
			</div>
			<div class="chart-canvas-wrap">
				<canvas id="inoutChart"></canvas>
			</div>
		</div>
		<div class="chart-card">
			<div class="chart-header">
				<span class="chart-title">상품 유형별 재고 비율</span>
				<span class="chart-tag">현재</span>
			</div>
			<div class="chart-canvas-wrap">
				<canvas id="typeChart"></canvas>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
	<script th:src="@{/js/chart.js}"></script>
</div>
</body>
</html>
